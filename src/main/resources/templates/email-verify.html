<!--/*@thymesVar id="userName" type="java.lang.String"*/-->
<!--/*@thymesVar id="code" type="java.lang.String"*/-->
<!--/*@thymesVar id="email" type="java.lang.String"*/-->
<!--/*@thymesVar id="emailBase64" type="java.lang.String"*/-->
<!--/*@thymesVar id="server" type="java.lang.String"*/-->
<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册验证码 - 洛洛希雅的午后梦乡</title>
    <style>
        .main {
            max-width: 1024px;
            margin: 0 auto;
            border-left: cornflowerblue 5px solid;
            padding: 0.5em 2em 2em 2em;
            background: #efefef;
        }

        .main .title-hr {
            margin-bottom: 1.5em;
        }

        .main .message-block {
            min-height: 200px;
        }

        .main .message-block .code {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main .message-block .code .code-text{
            color: white;
            background-color: #888888;
            font-size: 3em;
            font-family: '黑体', monospace;
            padding: 0.2em 0.5em;
            margin: 0.2em;
            user-select: all;
        }
    </style>
</head>
<body>
<div class="main">
    <p style="display: none">
        尊敬的[[${ userName }]]您好。您的验证码是[[${ code }]]。这是由系统自动发送的邮件，请勿回复。
    </p>
    <h1 class="title">洛洛希雅的午后梦乡</h1>
    <hr class="title-hr">
    <div class="message-block">
        <p>
            尊敬的
            <span th:text="${userName}">用户</span>，您好。<br>
            您正在申请注册账号，请勿泄露或转发此邮件，以免造成您的账号被盗用或遭遇其他安全问题。<br/><br/>
            以下是您的验证码，请在注册页面输入验证码完成注册：
        </p>
        <div class="code">
            <p class="code-text" th:text="${code}">------</p>
        </div>
    </div>
    <div>
        <p>
            <a th:href="@{${server} + '/home/mail/tui-ding?id=' + ${emailBase64}}">不是您的邮件？点击此处退订</a>
        </p>
    </div>
</div>
</body>
</html>
